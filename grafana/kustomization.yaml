apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: grafana-k8s-monitoring
resources:
  - namespace.yaml
  - config.yaml
  - https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/v0.90.1/jsonnet/prometheus-operator/servicemonitors-crd.json
  - https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/v0.90.1/jsonnet/prometheus-operator/podmonitors-crd.json
helmCharts:
  - name: k8s-monitoring
    namespace: monitoring
    repo: https://grafana.github.io/helm-charts
    version: 4.0.0
    releaseName: k8s-monitoring
    includeCRDs: true
    valuesFile: operator-values.yaml
